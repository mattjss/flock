<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flock</title>
  <style>
    :root { --sz: 422px; }
    @media (min-width: 1440px) { :root { --sz: 576px; } }
    @media (max-width: 480px)  { :root { --sz: 322px; } }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; background: #000;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; font-family: system-ui, sans-serif; cursor: none;
    }
    #wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    canvas {
      width: var(--sz); height: var(--sz);
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); display: block;
    }
    #meta { display: flex; align-items: center; gap: 24px; }
    #label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="c"></canvas>
    <div id="meta">
      <span id="label">flock — move + click</span>
    </div>
  </div>
<script>
  const SZ = 422;
  const canvas = document.getElementById('c');
  canvas.width = canvas.height = SZ;
  const ctx = canvas.getContext('2d');

  const N          = 150;
  const MAX_SPEED  = 125;
  const MIN_SPEED  = 36;
  const MAX_FORCE  = 380;
  const SEP_R = 25, ALI_R = 52, COH_R = 52;
  const SEP_W = 2.1, ALI_W = 1.05, COH_W = 0.80;
  const AVOID_R = 82, AVOID_W = 4.8;
  const MARGIN  = 36;
  const CONN_R  = 38;  // max dist for connection lines
  const TRAIL   = 10;

  let mx = SZ/2, my = SZ/2, isInside = false;
  const waves = [];
  let flashAlpha = 0;

  function clamp(vx, vy, max) {
    const s = Math.sqrt(vx*vx + vy*vy);
    return s > max ? [vx/s*max, vy/s*max] : [vx, vy];
  }
  function ensureMin(vx, vy, min) {
    const s = Math.sqrt(vx*vx + vy*vy);
    if (s === 0) return [min, 0];
    return s < min ? [vx/s*min, vy/s*min] : [vx, vy];
  }

  const boids = [];
  for (let i = 0; i < N; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = MIN_SPEED + Math.random() * 30;
    boids.push({
      x:  SZ/2 + (Math.random()-0.5) * 80,
      y:  SZ/2 + (Math.random()-0.5) * 80,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      trail: [],
    });
  }

  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mx = (e.clientX - r.left) * (SZ / r.width);
    my = (e.clientY - r.top)  * (SZ / r.height);
    isInside = true;
    maybeTick(e.clientX, e.clientY);
  });
  canvas.addEventListener('mouseenter', () => isInside = true);
  canvas.addEventListener('mouseleave', () => isInside = false);

  canvas.addEventListener('pointerdown', e => {
    const r  = canvas.getBoundingClientRect();
    const ex = (e.clientX - r.left) * (SZ / r.width);
    const ey = (e.clientY - r.top)  * (SZ / r.height);
    boids.forEach(b => {
      const dx = b.x - ex, dy = b.y - ey;
      const d = Math.sqrt(dx*dx + dy*dy) + 1;
      const str = 10000 / (d * d);
      b.vx += (dx/d) * str;
      b.vy += (dy/d) * str;
      [b.vx, b.vy] = clamp(b.vx, b.vy, MAX_SPEED * 3.5);
    });
    waves.push({ x: ex, y: ey, r: 0, born: 0 });
    flashAlpha = 0.14;
    playClick();
  });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0], r = canvas.getBoundingClientRect();
    mx = (t.clientX - r.left) * (SZ / r.width);
    my = (t.clientY - r.top)  * (SZ / r.height);
    isInside = true;
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0], r = canvas.getBoundingClientRect();
    mx = (t.clientX - r.left) * (SZ / r.width);
    my = (t.clientY - r.top)  * (SZ / r.height);
  }, { passive: false });
  canvas.addEventListener('touchend', () => isInside = false);

  function update(dt) {
    boids.forEach(b => {
      let sfx=0, sfy=0, sn=0;
      let afx=0, afy=0, an=0;
      let cfx=0, cfy=0, cn=0;

      boids.forEach(o => {
        if (o === b) return;
        const dx = b.x - o.x, dy = b.y - o.y;
        const d2 = dx*dx + dy*dy;
        const d  = Math.sqrt(d2);
        if (d < SEP_R) { sfx += dx / (d2 + 0.01); sfy += dy / (d2 + 0.01); sn++; }
        if (d < ALI_R) { afx += o.vx; afy += o.vy; an++; }
        if (d < COH_R) { cfx += o.x;  cfy += o.y;  cn++; }
      });

      let fx = 0, fy = 0;
      if (sn > 0) { const [sx, sy] = clamp(sfx, sfy, MAX_SPEED); fx += (sx - b.vx) * SEP_W; fy += (sy - b.vy) * SEP_W; }
      if (an > 0) { const [ax, ay] = clamp(afx/an, afy/an, MAX_SPEED); fx += (ax - b.vx) * ALI_W; fy += (ay - b.vy) * ALI_W; }
      if (cn > 0) { const [cx, cy] = clamp(cfx/cn - b.x, cfy/cn - b.y, MAX_SPEED); fx += cx * COH_W; fy += cy * COH_W; }

      if (isInside) {
        const dx = b.x - mx, dy = b.y - my;
        const d = Math.sqrt(dx*dx + dy*dy) + 0.1;
        if (d < AVOID_R) {
          const str = (1 - d/AVOID_R) * AVOID_W;
          fx += (dx/d) * MAX_SPEED * str;
          fy += (dy/d) * MAX_SPEED * str;
        }
      }

      if (b.x < MARGIN)      fx += (MARGIN - b.x)        * 6;
      if (b.x > SZ-MARGIN)   fx -= (b.x - (SZ-MARGIN))   * 6;
      if (b.y < MARGIN)      fy += (MARGIN - b.y)        * 6;
      if (b.y > SZ-MARGIN)   fy -= (b.y - (SZ-MARGIN))   * 6;

      [fx, fy] = clamp(fx, fy, MAX_FORCE);
      b.vx += fx * dt;
      b.vy += fy * dt;
      [b.vx, b.vy] = clamp(b.vx, b.vy, MAX_SPEED);
      [b.vx, b.vy] = ensureMin(b.vx, b.vy, MIN_SPEED);

      b.x += b.vx * dt;
      b.y += b.vy * dt;

      b.trail.push({ x: b.x, y: b.y });
      if (b.trail.length > TRAIL) b.trail.shift();
    });

    for (let i = waves.length - 1; i >= 0; i--) {
      waves[i].born += dt;
      waves[i].r    += 275 * dt;
      if (waves[i].r > SZ * 1.5) waves.splice(i, 1);
    }
    flashAlpha *= 0.84;
  }

  function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, SZ, SZ);

    if (flashAlpha > 0.004) {
      ctx.fillStyle = `rgba(255,255,255,${flashAlpha.toFixed(3)})`;
      ctx.fillRect(0, 0, SZ, SZ);
    }

    // Connection lines between close boids
    ctx.beginPath();
    for (let i = 0; i < boids.length; i++) {
      const a = boids[i];
      for (let j = i+1; j < boids.length; j++) {
        const b = boids[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        if (dx*dx + dy*dy < CONN_R*CONN_R) {
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
        }
      }
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.10)';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // Shockwave rings
    waves.forEach(w => {
      const a = Math.max(0, 0.42 * (1 - w.born * 1.5));
      ctx.beginPath();
      ctx.arc(w.x, w.y, w.r, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(255,255,255,${a.toFixed(3)})`;
      ctx.lineWidth = 1.2;
      ctx.stroke();
    });

    // Boids
    boids.forEach(b => {
      const spd   = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
      const t     = spd / MAX_SPEED;
      const alpha = 0.38 + t * 0.52;
      const ang   = Math.atan2(b.vy, b.vx);
      const sz    = 4.2 + t * 2.0;

      // Trail line
      if (b.trail.length > 1) {
        ctx.beginPath();
        ctx.moveTo(b.trail[0].x, b.trail[0].y);
        for (let k = 1; k < b.trail.length; k++) ctx.lineTo(b.trail[k].x, b.trail[k].y);
        ctx.strokeStyle = `rgba(255,255,255,${(alpha * 0.22).toFixed(3)})`;
        ctx.lineWidth = 0.65;
        ctx.lineCap = 'round';
        ctx.stroke();
      }

      // Chevron
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(ang);
      ctx.beginPath();
      ctx.moveTo(sz, 0);
      ctx.lineTo(-sz * 0.62, -sz * 0.36);
      ctx.lineTo(-sz * 0.38, 0);
      ctx.lineTo(-sz * 0.62,  sz * 0.36);
      ctx.closePath();
      ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;
      ctx.fill();
      ctx.restore();
    });

    if (isInside) {
      ctx.beginPath();
      ctx.arc(mx, my, 2, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fill();
    }
  }

  let hoverAudio = null, clickAudio = null;
  function initAudio() {
    if (hoverAudio) return;
    hoverAudio = new Audio('./sounds/selection.mp3');
    hoverAudio.volume = 0.06;
    clickAudio = new Audio('./sounds/selection.mp3');
    clickAudio.volume = 0.42;
  }
  function playHover() { initAudio(); hoverAudio.currentTime = 0; hoverAudio.play().catch(()=>{}); }
  function playClick() { initAudio(); clickAudio.currentTime = 0; clickAudio.play().catch(()=>{}); }

  let lastTick = {x:0,y:0}, lastTickMs = 0;
  function maybeTick(x, y) {
    const dx = x - lastTick.x, dy = y - lastTick.y;
    if (dx*dx + dy*dy < 48*48) return;
    const now = performance.now();
    if (now - lastTickMs < 220) return;
    lastTick = {x, y}; lastTickMs = now;
    playHover();
  }

  let lastT = performance.now();
  function loop(now) {
    const dt = Math.min((now - lastT) / 1000, 0.05);
    lastT = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
</script>
</body>
</html>
